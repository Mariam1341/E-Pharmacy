<nav-bar is-logged-in="isLoggedIn" 
    current-user="currentUser" 
    cart-count="cartCount" 
    show-cart="showCart" 
    logout="handleLogout()"></nav-bar>
<div class="container py-5 mt-5">
    <div class="row g-4">
        <div class="col-md-4">
            <div class="card border-0 shadow-sm rounded-4 text-center p-4">
                <div class="mb-3">
                    <div class="rounded-circle bg-light d-inline-flex align-items-center justify-content-center" style="width: 80px; height: 80px;">
                        <i class="fas fa-user-circle fa-3x text-teal" style="color: #14b8a6;"></i>
                    </div>
                </div>
                <h5 class="fw-bold mb-1">{{currentUser.name}}</h5>
                <p class="text-muted small mb-3">{{currentUser.email}}</p>
                <hr>
                <div class="text-start px-2">
                    <p class="small mb-1"><strong>Phone:</strong> {{currentUser.phone || 'Not set'}}</p>
                    <!-- <p class="small mb-0"><strong>Address:</strong> {{currentUser.address || 'Not set'}}</p> -->
                </div>
                <button class="btn btn-outline-teal btn-sm w-100 mt-4 rounded-pill" style="color: #14b8a6; border-color: #14b8a6;">
                    Edit Profile
                </button>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card border-0 shadow-sm rounded-4 p-4">
                <h5 class="fw-bold mb-4">My Orders History</h5>
                
                <div class="text-center py-5" ng-if="myOrders.length === 0">
                    <i class="fas fa-shopping-bag fa-3x text-light mb-3"></i>
                    <p class="text-muted">You haven't placed any orders yet.</p>
                </div>

                <div class="table-responsive" ng-if="myOrders.length > 0">
                    <table class="table table-hover align-middle">
                        <thead class="bg-light">
                            <tr>
                                <th class="small border-0">Order ID</th>
                                <th class="small border-0">Date</th>
                                <th class="small border-0">Total</th>
                                <th class="small border-0 text-center">Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr ng-repeat="order in myOrders">
                                <td class="fw-bold small">#{{order.id}}</td>
                                <td class="text-muted small">{{order.created_at | date:'dd MMM yyyy'}}</td>
                                <td class="fw-bold small">{{order.totalAmount}}£</td>
                                <td class="text-center">
                                    <span class="badge rounded-pill px-3 py-2" 
                                          ng-class="order.status === 'Delivered' ? 'bg-success-subtle text-success' : 'bg-warning-subtle text-warning'"
                                          style="font-size: 0.7rem;">
                                        {{ order.status || 'Pending' }}
                                    </span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
